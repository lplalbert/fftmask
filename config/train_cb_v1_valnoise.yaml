# ── 版本信息 ──────────────────────────────────────────
# v1_valnoise: 在 v1 基础上，验证集跟随训练噪声调度
version: "v1_valnoise"
description: "Cb通道解码 + 两两配对噪声 + 验证集加噪声"

# ── 数据集（混合数据源）──────────────────────────────
train_data_paths:
  - "/mnt/xsj2023/Datasets/document_ds/document_train"
  - "/mnt/xsj2023/Datasets/COCO/coco_minator_dataset/train"
train_data_lengths:
  - 5000
  - 5000
val_dir: "/mnt/xsj2023/Datasets/document_ds/document_val"

# ── 模型 ──────────────────────────────────────────
resume: "/mnt/lpl/fftmask/output/v1_valnoise/20260629_005346/models/best_cb_decoder.pth"
output_dir: "/mnt/lpl/fftmask/output/v1_valnoise"
block_size: 512
num_bits: 60
r: [12, 25]
bitsf: [15, 45]
radius_bins: 12

# ── 训练参数 ──────────────────────────────────────
batch_size: 64
epochs: 100
lr: 0.0001
device: "2,3"

# ── 噪声策略 ──────────────────────────────────────
# 格式: [结束epoch(不含), alpha, noise_level]
# 验证集自动跟随训练噪声调度，无需额外配置
noise_schedule:
  - [999, 0.016, "pair"]

# ── 模式 ──────────────────────────────────────────────
mode: "decoder_only"

# 损失权重
lambda_bit: 15.0
lambda_shape: 0.04
